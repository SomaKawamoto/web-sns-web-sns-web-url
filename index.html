<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6f2e9" />
    <meta
      name="description"
      content="日本百名山の登頂状況をチェックし、SNS投稿用画像を生成できるWebアプリ。"
    />
    <title>日本百名山チェック</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true">
            <img src="./assets/brand-logo-white-transparent.png" width="64" height="46" alt="" />
          </div>
          <div>
            <p class="eyebrow">Hyakumeizan Badge</p>
            <h1>日本百名山チェック</h1>
          </div>
        </div>
        <div class="header-menu">
          <button class="menu-button" id="menuButton" type="button" aria-label="メニューを開く" aria-expanded="false" aria-controls="headerMenu">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div class="menu-popover" id="headerMenu" hidden>
            <a href="./about.html">百名山とは</a>
            <button type="button" id="menuShareButton">SNS画像を共有</button>
            <button type="button" id="menuClearButton">全解除</button>
          </div>
        </div>
      </header>

      <main class="layout" id="mainLayout">
        <section class="panel progress-panel" aria-labelledby="progressTitle">
          <div class="progress-head">
            <div class="summit-badge" aria-hidden="true">
              <img src="./assets/brand-logo-white-transparent.png" width="79" height="79" alt="" />
            </div>
            <div>
              <p class="eyebrow">登頂済み</p>
              <h2 id="progressTitle"><span id="climbedCount">0</span><span>/100</span></h2>
            </div>
            <div class="rate-ring"><span id="rateValue">0</span>%</div>
          </div>
          <div class="progress-track" aria-label="達成率">
            <div class="progress-fill" id="progressFill"></div>
          </div>

          <div class="map-wrap">
            <div class="map-legend" aria-hidden="true">
              <span><i class="legend-dot climbed"></i>登頂済み</span>
              <span><i class="legend-dot"></i>未踏</span>
            </div>
            <svg id="mountainMap" viewBox="0 0 420 520" role="img" aria-label="日本百名山の登頂地図">
              <defs>
                <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
                  <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#233126" flood-opacity="0.12" />
                </filter>
              </defs>
              <g class="japan-shape" id="japanMapPaths" filter="url(#softShadow)" aria-hidden="true"></g>
              <g id="mountainDots"></g>
            </svg>
          </div>
          <button class="map-share-button" id="openShareButton" type="button">
            <img class="share-icon" src="./assets/share-ios.png" width="24" height="24" alt="" />
            <span>共有</span>
          </button>
        </section>

        <section class="panel controls-panel" aria-label="百名山チェックリスト">
          <p class="taunt" id="tauntText">まだ地図は白い。ここから全部始まる。</p>
          <div class="toolbar">
            <label class="search-box">
              <span>山名検索</span>
              <input id="searchInput" type="search" placeholder="山名検索" autocomplete="off" />
            </label>
            <div class="segmented" aria-label="表示切り替え">
              <button class="segment is-active" type="button" data-status="all">全て</button>
              <button class="segment" type="button" data-status="climbed">登頂済み</button>
              <button class="segment" type="button" data-status="unclimbed">未踏</button>
            </div>
            <select id="areaFilter" aria-label="エリア絞り込み">
              <option value="all">全エリア</option>
            </select>
          </div>

          <div class="list-meta">
            <span id="visibleCount">100座表示</span>
            <button class="text-button" id="listClearButton" type="button">全解除</button>
          </div>

          <div class="mountain-list" id="mountainList"></div>
        </section>

        <div class="share-modal" id="shareModal" hidden>
          <aside class="panel share-panel" id="sharePanel" role="dialog" aria-modal="true" aria-labelledby="shareTitle" tabindex="-1">
            <div class="share-head">
              <div class="mini-lockup">
                <div class="mini-mark" aria-hidden="true">
                  <img src="./assets/brand-logo-white-transparent.png" width="36" height="36" alt="" />
                </div>
                <div>
                  <p class="eyebrow">SNS画像</p>
                  <h2 id="shareTitle">地図型テンプレート</h2>
                </div>
              </div>
              <div class="share-head-actions">
                <span class="format-badge">PNG</span>
                <button class="icon-button" id="closeShareButton" type="button" aria-label="閉じる">×</button>
              </div>
            </div>
            <canvas id="shareCanvas" width="1080" height="1080" aria-label="SNS投稿用画像プレビュー"></canvas>
            <div class="actions">
              <button class="primary-button" id="downloadButton" type="button">画像保存</button>
              <button class="secondary-button icon-label-button" id="shareButton" type="button">
                <img class="share-icon" src="./assets/share-ios.png" width="24" height="24" alt="" />
                <span>共有</span>
              </button>
            </div>
            <p class="privacy-note">登頂データはこの端末のブラウザ内だけに保存されます。</p>
          </aside>
        </div>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
